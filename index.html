<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dyblocked Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="video-bg" aria-hidden="true">
    <iframe
      id="bgVideo"
      src="https://www.youtube.com/embed/mNcM7Sl0_CY?autoplay=1&loop=1&playlist=mNcM7Sl0_CY&controls=0&disablekb=1&modestbranding=1&playsinline=1&rel=0&enablejsapi=1"
      title="Background video"
      allow="autoplay; encrypted-media; picture-in-picture"
      referrerpolicy="strict-origin-when-cross-origin"
      loading="eager"></iframe>
  </div>
  <div class="video-tint"></div>

  <div class="app-shell" id="appShell" data-view="home">
    <header class="topbar">
      <div class="logo-wrap">
        <span class="logo-mark">DB</span>
        <div>
          <p class="logo-title">DYBLOCKED</p>
          <p class="logo-sub">Black Hole Launcher</p>
        </div>
      </div>
      <nav class="chip-nav">
        <span>Proxy</span>
        <span>Hacks</span>
        <span>Cloak</span>
      </nav>
    </header>

    <main>
      <section class="panel page home-page" id="homePage">
        <p class="tiny-label">Stealth network gateway</p>
        <h1>Dyblocked Launcher</h1>
        <p class="hero-copy">Fast unblocked games, cloaked links, and a launcher that feels like a sci-fi dashboard instead of a flat static page.</p>
        <div class="hero-buttons">
          <button class="main-btn" id="playGamesBtn">Play Games</button>
          <button class="ghost-btn" id="openRandomBtn">Quick Launch</button>
        </div>
        <div class="quick-grid" id="homeFeatured"></div>
      </section>

      <section class="panel page games-page" id="gamesPage" aria-hidden="true">
        <div class="games-head">
          <button class="ghost-btn" id="backHomeBtn">← Back</button>
          <h2>Game Vault</h2>
          <p id="countText">0 games</p>
        </div>
        <div class="filters">
          <input id="searchInput" type="text" placeholder="Search title or description" />
          <select id="categorySelect">
            <option value="">All categories</option>
          </select>
        </div>
        <div class="games-grid" id="gamesGrid"></div>
      </section>
    </main>
  </div>

  <div class="modal" id="gameModal" aria-hidden="true">
    <div class="modal-backdrop" id="closeModalBackdrop"></div>
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modalTitle">Game</h3>
        <button class="ghost-btn" id="closeModalBtn">Close</button>
      </div>
      <div class="modal-frame" id="modalFrame"></div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="script.js"></script>
</body>
</html>
